<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景 -->
  <rect width="100" height="100" rx="20" fill="#4CAF50"/>
  
  <!-- 剪贴板主体 -->
  <rect x="20" y="25" width="60" height="65" rx="8" fill="white"/>
  
  <!-- 剪贴板顶部夹子 -->
  <rect x="35" y="15" width="30" height="15" rx="4" fill="#E8F5E9"/>
  <rect x="42" y="18" width="16" height="8" rx="2" fill="#4CAF50"/>
  
  <!-- 剪贴板上的线条（代表文字） -->
  <rect x="28" y="40" width="44" height="4" rx="2" fill="#E0E0E0"/>
  <rect x="28" y="50" width="36" height="4" rx="2" fill="#E0E0E0"/>
  <rect x="28" y="60" width="40" height="4" rx="2" fill="#E0E0E0"/>
  <rect x="28" y="70" width="28" height="4" rx="2" fill="#E0E0E0"/>
  
  <!-- 右下角小图标 -->
  <circle cx="75" cy="75" r="12" fill="#FF5722"/>
  <text x="75" y="80" font-size="12" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">Ji</text>
</svg>
